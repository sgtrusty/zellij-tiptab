name: Release

on:
  push:
    # branches: [main]
    branches: ["**"]

env:
  PLUGIN_NAME: zellij-tiptab

jobs:
  check:
    if: startsWith(github.event.head_commit.message, 'build(v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from commit message
        id: version
        run: |
          msg="${{ github.event.head_commit.message }}"
          ver=$(echo "$msg" | sed -n 's/^build(v\([0-9]*\.[0-9]*\.[0-9]*\)[^)]*):.*/\1/p')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  release:
    needs: [check]
    if: needs.check.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip1

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target wasm32-wasip1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          files: target/wasm32-wasip1/release/${{ env.PLUGIN_NAME }}.wasm
          generate_release_notes: true

